receivers:
  prometheus/node_exporter:
    config:
      scrape_configs:
        - job_name: node-exporter
          scrape_interval: 30s
          static_configs:
            - targets: ["127.0.0.1:9100"]

  prometheus/kube_state_metrics:
    config:
      scrape_configs:
        - job_name: kube-state-metrics
          scrape_interval: 30s
          scheme: https
          tls_config:
            ca_file: /var/lib/microshift/certs/service-ca/ca.crt
          kubernetes_sd_configs:
            - kubeconfig_file: /var/lib/microshift/resources/observability-client/kubeconfig
              role: endpoints
              namespaces:
                names: [openshift-monitoring]
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
              action: keep
              regex: kube-state-metrics;https-main

  prometheus/metrics_server:
    config:
      scrape_configs:
        - job_name: metrics-server
          scrape_interval: 30s
          scheme: https
          tls_config:
            ca_file: /var/lib/microshift/certs/service-ca/ca.crt
          kubernetes_sd_configs:
            - kubeconfig_file: /var/lib/microshift/resources/observability-client/kubeconfig
              role: endpoints
              namespaces:
                names: [openshift-monitoring]
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
              action: keep
              regex: metrics-server;https

service:
  pipelines:
    metrics/node_exporter:
      receivers: [prometheus/node_exporter]
      processors: [batch]
      exporters: [otlp]
    metrics/kube_state_metrics:
      receivers: [prometheus/kube_state_metrics]
      processors: [batch]
      exporters: [otlp]
    metrics/metrics_server:
      receivers: [prometheus/metrics_server]
      processors: [batch]
      exporters: [otlp]
