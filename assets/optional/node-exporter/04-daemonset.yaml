apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: openshift-monitoring
  labels:
    app.kubernetes.io/name: node-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-exporter
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
        openshift.io/required-scc: privileged
    spec:
      serviceAccountName: node-exporter
      hostNetwork: true
      hostPID: true
      containers:
        - name: node-exporter
          image: quay.io/openshift/node-exporter:latest
          imagePullPolicy: IfNotPresent
          args:
            - --web.listen-address=127.0.0.1:9100
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --path.udev.data=/host/root/run/udev/data
            - --no-collector.wifi
          ports:
            - containerPort: 9100
              hostPort: 9100
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 8m
              memory: 32Mi
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: sys
              mountPath: /host/sys
              mountPropagation: HostToContainer
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
        - name: kube-rbac-proxy
          image: quay.io/openshift/kube-rbac-proxy:latest
          imagePullPolicy: IfNotPresent
          args:
            - --secure-listen-address=:9101
            - --tls-cipher-suites=TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
            - --tls-min-version=VersionTLS12
            - --upstream=http://127.0.0.1:9100/
            - --tls-cert-file=/etc/tls/private/tls.crt
            - --tls-private-key-file=/etc/tls/private/tls.key
          ports:
            - containerPort: 9101
              hostPort: 9101
              name: https
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: metrics-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
        - name: metrics-tls
          secret:
            secretName: node-exporter-tls
        - name: tmp
          emptyDir: {}
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
