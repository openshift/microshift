apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.metrics.k8s.io
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
spec:
  service:
    name: metrics-server
    namespace: openshift-monitoring
  group: metrics.k8s.io
  version: v1beta1
  groupPriorityMinimum: 100
  versionPriority: 100
