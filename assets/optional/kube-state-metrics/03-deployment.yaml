apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: exporter
    app.kubernetes.io/managed-by: cluster-monitoring-operator
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/part-of: openshift-monitoring
    app.kubernetes.io/version: 2.19.1
  name: kube-state-metrics
  namespace: openshift-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: exporter
      app.kubernetes.io/name: kube-state-metrics
      app.kubernetes.io/part-of: openshift-monitoring
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: kube-state-metrics
        openshift.io/required-scc: restricted-v2
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
      labels:
        app.kubernetes.io/component: exporter
        app.kubernetes.io/managed-by: cluster-monitoring-operator
        app.kubernetes.io/name: kube-state-metrics
        app.kubernetes.io/part-of: openshift-monitoring
        app.kubernetes.io/version: 2.19.1
    spec:
      automountServiceAccountToken: true
      containers:
        - args:
            - --host=127.0.0.1
            - --port=8081
            - --telemetry-host=127.0.0.1
            - --telemetry-port=8082
            - --custom-resource-state-config-file=/etc/kube-state-metrics/custom-resource-state-configmap.yaml
            - |
              --metric-denylist=
              ^kube_secret_labels$,
              ^kube_.+_annotations$,
              ^kube_customresource_.+_annotations_info$,
              ^kube_customresource_.+_labels_info$
            - --metric-labels-allowlist=pods=[*],nodes=[*],namespaces=[*],persistentvolumes=[*],persistentvolumeclaims=[*],poddisruptionbudgets=[*]
            - |
              --metric-denylist=
              ^kube_.+_created$,
              ^kube_.+_metadata_resource_version$,
              ^kube_replicaset_metadata_generation$,
              ^kube_replicaset_status_observed_generation$,
              ^kube_pod_restart_policy$,
              ^kube_pod_init_container_status_terminated$,
              ^kube_pod_init_container_status_running$,
              ^kube_pod_container_status_terminated$,
              ^kube_pod_container_status_running$,
              ^kube_pod_completion_time$,
              ^kube_pod_status_scheduled$
          image: "quay.io/openshift/kube-state-metrics"
          name: kube-state-metrics
          resources:
            requests:
              cpu: 2m
              memory: 80Mi
            limits:
              cpu: 100m
              memory: 200Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /tmp
              name: volume-directive-shadow
              readOnly: false
            - mountPath: /etc/kube-state-metrics
              name: kube-state-metrics-custom-resource-state-configmap
              readOnly: true
        - args:
            - --secure-listen-address=:8443
            - --tls-cipher-suites=TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
            - --upstream=http://127.0.0.1:8081/
            - --tls-cert-file=/etc/tls/private/tls.crt
            - --tls-private-key-file=/etc/tls/private/tls.key
            - --client-ca-file=/etc/tls/client/client-ca.crt
            - --config-file=/etc/kube-rbac-policy/config.yaml
          image: "quay.io/openshift/kube-rbac-proxy"
          name: kube-rbac-proxy-main
          ports:
            - containerPort: 8443
              name: https-main
          resources:
            requests:
              cpu: 1m
              memory: 15Mi
            limits:
              cpu: 20m
              memory: 40Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /etc/tls/private
              name: kube-state-metrics-tls
              readOnly: true
            - mountPath: /etc/kube-rbac-policy
              name: kube-state-metrics-kube-rbac-proxy-config
              readOnly: true
            - mountPath: /etc/tls/client
              name: metrics-client-ca
              readOnly: true
        - args:
            - --secure-listen-address=:9443
            - --tls-cipher-suites=TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
            - --upstream=http://127.0.0.1:8082/
            - --tls-cert-file=/etc/tls/private/tls.crt
            - --tls-private-key-file=/etc/tls/private/tls.key
            - --client-ca-file=/etc/tls/client/client-ca.crt
            - --config-file=/etc/kube-rbac-policy/config.yaml
          image: "quay.io/openshift/kube-rbac-proxy"
          name: kube-rbac-proxy-self
          ports:
            - containerPort: 9443
              name: https-self
          resources:
            requests:
              cpu: 1m
              memory: 15Mi
            limits:
              cpu: 20m
              memory: 40Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /etc/tls/private
              name: kube-state-metrics-tls
              readOnly: true
            - mountPath: /etc/kube-rbac-policy
              name: kube-state-metrics-kube-rbac-proxy-config
              readOnly: true
            - mountPath: /etc/tls/client
              name: metrics-client-ca
              readOnly: true
      nodeSelector:
        kubernetes.io/os: linux
      priorityClassName: system-cluster-critical
      securityContext:
        runAsNonRoot: true
      serviceAccountName: kube-state-metrics
      volumes:
        - emptyDir: {}
          name: volume-directive-shadow
        - name: kube-state-metrics-tls
          secret:
            secretName: kube-state-metrics-tls
        - name: kube-state-metrics-kube-rbac-proxy-config
          secret:
            secretName: kube-state-metrics-kube-rbac-proxy-config
        - configMap:
            name: kube-state-metrics-custom-resource-state-configmap
          name: kube-state-metrics-custom-resource-state-configmap
        - configMap:
            name: metrics-client-ca
          name: metrics-client-ca
