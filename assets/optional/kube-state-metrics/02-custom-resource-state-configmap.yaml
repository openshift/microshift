            "stateSet":
              "labelName": "updatemode"
              "list":
              - "Off"
              - "Initial"
              - "Recreate"
              - "Auto"
              "path":
              - "spec"
              - "updatePolicy"
              - "updateMode"
            "type": "StateSet"
          "help": "Update mode of the VerticalPodAutoscaler."
          "labelsFromPath":
            "namespace":
            - "metadata"
            - "namespace"
            "target_api_version":
            - "spec"
            - "targetRef"
            - "apiVersion"
            "target_kind":
            - "spec"
            - "targetRef"
            - "kind"
            "target_name":
            - "spec"
            - "targetRef"
            - "name"
            "verticalpodautoscaler":
            - "metadata"
            - "name"
          "name": "verticalpodautoscaler_spec_updatepolicy_updatemode"
        - "commonLabels":
            "resource": "cpu"
            "unit": "cores"
          "each":
            "gauge":
              "labelsFromPath":
                "container":
                - "containerName"
              "path":
              - "status"
              - "recommendation"
              - "containerRecommendations"
              "valueFrom":
              - "lowerBound"
              - "cpu"
            "type": "Gauge"
          "help": "Minimum cpu resources the container can use before the VerticalPodAutoscaler updater evicts it."
          "labelsFromPath":
