            - "targetRef"
            - "apiVersion"
            "target_kind":
            - "spec"
            - "targetRef"
            - "kind"
            "target_name":
            - "spec"
            - "targetRef"
            - "name"
            "verticalpodautoscaler":
            - "metadata"
            - "name"
          "name": "verticalpodautoscaler_status_recommendation_containerrecommendations_lowerbound_cpu"
        - "commonLabels":
            "resource": "memory"
            "unit": "bytes"
