kind: DaemonSet
apiVersion: apps/v1
# name, namespace and labels are set at runtime
spec:
  # minReadySeconds should be 3x the readiness probe's polling interval (i.e. periodSeconds).
  minReadySeconds: 9
  template:
    metadata:
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
    spec:
      serviceAccountName: dns
      priorityClassName: system-node-critical
      containers:
      - name: dns
        # image is set at runtime
        imagePullPolicy: IfNotPresent
        terminationMessagePolicy: FallbackToLogsOnError
        command: [ "coredns" ]
        args: [ "-conf", "/etc/coredns/Corefile" ]
        volumeMounts:
        - name: config-volume
          mountPath: /etc/coredns
          readOnly: true
        - mountPath: /tmp
          name: tmp-dir
        ports:
        - containerPort: 5353
          name: dns
          protocol: UDP
        - containerPort: 5353
          name: dns-tcp
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /ready
            port: 8181
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 3 # Update the daemonset's spec.minReadySeconds above if you change this value!
          successThreshold: 1
          failureThreshold: 3
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 60
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 5
        resources:
          requests:
            cpu: 50m
            memory: 70Mi
        securityContext:
          readOnlyRootFilesystem: true
      - name: kube-rbac-proxy
        # image and args are set at runtime by the operator based on the
        # centralized TLS security profile from apiservers.config.openshift.io/cluster
        ports:
        - containerPort: 9154
          name: metrics
        resources:
          requests:
            cpu: 10m
            memory: 40Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /etc/tls/private
          name: metrics-tls
          readOnly: true
        - mountPath: /tmp
          name: tmp-dir
        securityContext:
          readOnlyRootFilesystem: true
      dnsPolicy: Default
      # nodeSelector is set at runtime.
      volumes:
      - name: config-volume
        configMap:
        # Name is set at runtime
          items:
          - key: Corefile
            path: Corefile
      - name: metrics-tls
        # secretName is set at runtime
      - name: tmp-dir
        emptyDir: {}
      # tolerations is set at runtime.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      # Set maxSurge to a positive value so that each node that has a pod
      # continues to have a local ready pod during a rolling update.  This is
      # important for topology-aware hints as well as for similar logic in
      # openshift-sdn and ovn-kubernetes that prefers to use a local ready DNS
      # pod whenever one exists.
      maxSurge: 10%
      # maxUnavailable must be zero when maxSurge is nonzero.
      maxUnavailable: 0
