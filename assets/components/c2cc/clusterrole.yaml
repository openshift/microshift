apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: microshift-c2cc-probe
rules:
- apiGroups:
  - microshift.io
  resources:
  - remoteclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - microshift.io
  resources:
  - remoteclusters/status
  verbs:
  - update
  - patch
- apiGroups:
  - security.openshift.io
  resources:
  - securitycontextconstraints
  verbs:
  - use
  resourceNames:
  - privileged
