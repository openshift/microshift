---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: remoteclusters.microshift.io
spec:
  group: microshift.io
  names:
    kind: RemoteCluster
    listKind: RemoteClusterList
    plural: remoteclusters
    singular: remotecluster
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RemoteCluster represents a remote cluster's healthcheck probe target.
          Created by the C2CC controller, read and updated by the probe pod.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              probeInterval:
                default: 10s
                description: Interval between probe attempts (e.g. "10s", "1m").
                type: string
              probeTarget:
                description: IP:port of the remote cluster's probe service (11th IP
                  in remote service CIDR, port 8080).
                type: string
            required:
            - probeInterval
            - probeTarget
            type: object
          status:
            description: RemoteClusterStatus is populated by the probe pod with health
              probe results.
            properties:
              errors:
                items:
                  type: string
                type: array
              lastProbeTime:
                format: date-time
                type: string
              lastSuccessfulProbe:
                format: date-time
                type: string
              latency:
                description: Latency statistics from recent probes (rolling window
                  of 20 samples).
                properties:
                  avg:
                    type: string
                  last:
                    type: string
                  max:
                    type: string
                  min:
                    type: string
                  stddev:
                    type: string
                required:
                - avg
                - last
                - max
                - min
                - stddev
                type: object
              state:
                default: NeverProbed
                enum:
                - NeverProbed
                - Healthy
                - Unhealthy
                type: string
            required:
            - state
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
