kind: Pod
apiVersion: v1
metadata:
  name: curl-pod
spec:
  terminationGracePeriodSeconds: 0
  containers:
  - name: curl
    image: quay.io/curl/curl:latest
    command: ["sleep", "infinity"]
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 10001
      seccompProfile:
        type: RuntimeDefault
