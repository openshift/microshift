apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: hello-microshift-operator.v0.1.0
  namespace: placeholder
  annotations:
    categories: "Testing"
spec:
  displayName: Hello MicroShift Operator
  description: A minimal test operator that deploys a simple HTTP server.
  version: 0.1.0
  maturity: alpha
  replaces: ""
  minKubeVersion: 1.25.0
  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true
  install:
    strategy: deployment
    spec:
      deployments:
        - name: hello-microshift
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: hello-microshift
            template:
              metadata:
                labels:
                  app: hello-microshift
              spec:
                terminationGracePeriodSeconds: 0
                containers:
                  - name: hello-microshift
                    image: quay.io/microshift/busybox:1.36
                    command: ["/bin/sh"]
                    args:
                      - "-c"
                      - 'while true; do echo -ne "HTTP/1.0 200 OK\r\nContent-Length: 16\r\n\r\nHello MicroShift" | nc -l -p 8080 ; done'
                    ports:
                      - containerPort: 8080
                        protocol: TCP
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      runAsNonRoot: true
                      seccompProfile:
                        type: RuntimeDefault
