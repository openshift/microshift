kind: Pod
apiVersion: v1
metadata:
  name: scc-test-pod-2
  labels:
    app: scc-test
spec:
  terminationGracePeriodSeconds: 0
  securityContext:
    runAsUser: 2000
  containers:
  - name: test
    image: quay.io/microshift/busybox:1.36
    command: ["/bin/sh", "-c", "sleep infinity"]
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      seccompProfile:
        type: RuntimeDefault
